<?xml version='1.0' ?>
<!DOCTYPE fontconfig SYSTEM 'fonts.dtd'>
<fontconfig>

  <alias>
    <family>serif</family>
    <prefer><family>Bitter</family></prefer>
  </alias>

  <alias>
    <family>sans-serif</family>
    <prefer><family>Roboto</family></prefer>
  </alias>

  <alias>
    <family>monospace</family>
    <prefer><family>JetBrainsMono Nerd Font Mono</family></prefer>
  </alias>

