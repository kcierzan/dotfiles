import = [
  "~/.config/alacritty/themes/dracula.toml"
]

[window]
decorations = "Buttonless"
option_as_alt = "Both"
padding = { x = 6, y = 6 }
blur = true

[font]
normal = { family = "Berkeley Mono", style = "Regular" }
bold = { family = "Berkeley Mono", style = "Bold" }
offset = { y = 8 }
size = 18

[cursor]
style = { shape = "Beam", blinking = "Never" }
thickness = 0.2
