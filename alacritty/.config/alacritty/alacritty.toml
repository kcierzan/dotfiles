import = [
  "~/.config/alacritty/themes/dracula.toml"
]

[window]
decorations = "Buttonless"
option_as_alt = "Both"
padding = { x = 6, y = 6 }
opacity = 0.9
blur = true

[font]
normal = { family = "IosevkaNeapolitan Nerd Font", style = "Regular" }
size = 18

[cursor]
style = { shape = "Beam", blinking = "Never" }
thickness = 0.2
