# source-file ~/.tmux-reset.conf
# screen mode
set -g default-terminal "screen-256color"

# Spacemux is love. Spacemux is life.
unbind C-b
set-option -g prefix C-Space
bind Space send-prefix

# shell
set -g default-shell /usr/local/bin/zsh
set -g default-command "reattach-to-user-namespace -l ${SHELL}"

# start with window 1 (instead of 0)
set -g base-index 1

# start with pane 1
set -g pane-base-index 1

# source config file
bind r source-file ~/.tmux.conf

# history
set -g history-limit 4096

# allow terminal scrolling
set-option -g terminal-overrides 'xterm*:smcup@:rmcup@'

# vim style copy paste mode
unbind [
bind Space copy-mode
unbind p
bind p paste-buffer
bind-key -t vi-copy 'v' begin-selection
bind -t vi-copy y copy-pipe 'reattach-to-user-namespace pbcopy'

# use vi mode
# setw -g mode-keys vi
# set -g status-keys vi

# pleb mode
set -g mouse on

# splitting
unbind %
bind v split-window -h
unbind '"'
bind s split-window -v

# colon :
bind : command-prompt

# resizing
setw -g aggressive-resize on

# tmux clock
set -g clock-mode-colour colour66

# some key-binding changes
bind x kill-pane
bind X next-layout
bind Z previous-layout
bind z resize-pane -Z

# toggle status bar visibility
bind t set status

# Fix escape delay
set -sg escape-time 0

# Enable cursor shape changing for neovim in tmux
set -g -a terminal-overrides ',*:Ss=\E[%p1%d q:Se=\E[2 q'

# Intelligent navigation through tmux and vim
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
	| grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n M-h if-shell "$is_vim" "send-keys M-h"  "select-pane -L"
bind-key -n M-j if-shell "$is_vim" "send-keys M-j"  "select-pane -D"
bind-key -n M-k if-shell "$is_vim" "send-keys M-k"  "select-pane -U"
bind-key -n M-l if-shell "$is_vim" "send-keys M-l"  "select-pane -R"
bind-key -n M-\ if-shell "$is_vim" "send-keys M-\\" "select-pane -l"

# Clear the tmux pane now that C-k moves us around
# bind C-l send-keys C-l
set-window-option -g automatic-rename off
set-option -g allow-rename off

# Source snapshot created with Neovim :TmuxlineSnapshot
if-shell "test -f ~/.tmuxline-theme" "source ~/.tmuxline-theme"
