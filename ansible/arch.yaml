    - name: Clone dotfiles
      git:
        repo: https://gitlab.com/kcierzan/dotfiles.git
        dest: "{{ home }}/.dotfiles"
    - name: Symlink dotfiles
      shell:
        chdir: "{{ home }}/.dotfiles"
        cmd: "stow {{ item }}"
      with_items:
        - awesome
        - bat
        - ctags
        - doom
        - ncmpcpp
        - neovim
        - picom
        - redshift
        - rofi
        - scripts
        - sxiv
        - tmux
        - vifm
        - xorg
        - zsh
    - name: Clone doom emacs
      git:
        repo: https://github.com/hlissner/doom-emacs
        dest: "{{ home }}/.emacs.d"
    - name: Install doom emacs
      shell:
        chdir: "{{ home }}/.emacs.d/bin"
        cmd: doom install
