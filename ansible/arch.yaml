---
- hosts: all
  vars:
    home: /home/rasmos
    src_home: /home/rasmos/git
  tasks:
    - name: Full system upgrade
      pacman:
        update_cache: yes
        upgrade: yes
    - name: Create the aur-builder user
      user:
        name: aur-builder
        group: wheel
      lineinfile:
        path: /etc/sudoers.d/11-install-aur-builder
        line: 'aur-builder ALL=(ALL) NOPASSWD: /usr/bin/pacman'
        create: yes
        validate: 'visudo -cf %s'
    - name: Install aur-helper ansible module
      git:
        repo: https://github.com/kewlfft/ansible-aur.git
        dest: "{{ home }}/.ansible/plugins/modules/aur"
    - name: Install yay
      aur: name=yay use=makepkg skip_installed=true
      become: yes
      become_user: aur-builder
    - name: Install packages with yay
      aur:
        use: yay
        name:
          - 1password-cli
          - alsa-plugins
          - alsa-utils
          - asciiquarium
          - autoconf
          - automake
          - awesome
          - b43-firmware  # support for ASUS Z97 WiFi card
          - bash
